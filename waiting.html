<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Waiting for Your Blind Bag</title>
<style>
body{
 margin:0;
 font-family:Arial,sans-serif;
 background:#FFD54F;
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100vh;
}
.card{
 background:#fff;
 width:90%;
 max-width:420px;
 border-radius:24px;
 padding:30px;
 text-align:center;
 box-shadow:0 10px 25px rgba(0,0,0,.2);
}
h1{color:#F4511E}
.spinner{
 width:80px;height:80px;
 border:10px solid #FFE7A8;
 border-top:10px solid #F4511E;
 border-radius:50%;
 margin:25px auto;
 animation:spin 1s linear infinite;
}
@keyframes spin{
 from{transform:rotate(0deg);}
 to{transform:rotate(360deg);}
}
.note{
 color:#555;
 margin-top:20px;
 line-height:1.5;
}
</style>
</head>
<body>
<div class="card">
<h1>🎁 Waiting for Your Blind Bag</h1>

<div class="spinner"></div>

<p><strong>Your blind bag is being made...</strong></p>

<p class="note">
⚠️ Please don't close this app or lock your phone.<br><br>
You'll hear a <strong>TING!</strong> and this page will change automatically
once Kabir marks your order as finished.
</p>

</div>
</body>
</html>
