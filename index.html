<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabir's Blind Bag Shop</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#FFD54F;
}

.page{
    display:none;
    text-align:center;
    padding:40px 20px;
}

.active{
    display:block;
}

h1,h2{
    color:#F4511E;
}

input{
    width:80%;
    max-width:350px;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:2px solid #ccc;
    margin:15px;
}

button{
    background:#F4511E;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

button:hover{
    background:#D84315;
}

.summary{
    font-size:20px;
    margin:20px;
}

img{
    width:220px;
    border-radius:12px;
}
</style>
</head>

<body>

<!-- HOME -->
<div class="page active" id="page1">
<h1>🎁 Kabir's Blind Bag Shop</h1>
<p>Welcome!</p>

<button onclick="next(2)">Start Order</button>
</div>

<!-- NAME -->
<div class="page" id="page2">

<h2>What's your name?</h2>

<input id="name" placeholder="Enter your name">

<br>

<button onclick="next(3)">Next</button>

</div>

<!-- BAG -->
<div class="page" id="page3">

<h2>Which Blind Bag do you want?</h2>

<input id="bag" placeholder="Type it here">

<br>

<button onclick="next(4)">Next</button>

</div>

<!-- TYPE -->
<div class="page" id="page4">

<h2>Choose One</h2>

<button onclick="chooseType('Handmade')">
Handmade
</button>

<button onclick="chooseType('Printed')">
Printed
</button>

</div>

<!-- SUMMARY -->
<div class="page" id="page5">

<h2>Order Summary</h2>

<div class="summary" id="summary"></div>

<button onclick="next(6)">
Confirm Order
</button>

</div>

<!-- QR -->
<div class="page" id="page6">

<h2>✅ Order Sent!</h2>

<p>
Scan this QR Code to open the Waiting App.
</p>

<!-- Replace with your own QR -->
<img src="waiting_qr.png">

<p>
or visit:
</p>

<a href="waiting.html">
Open Waiting App
</a>

</div>

<script>

let type="";

function show(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById("page"+page).classList.add("active");

}

function next(page){

show(page);

}

function chooseType(t){

type=t;

let name=document.getElementById("name").value;

let bag=document.getElementById("bag").value;

document.getElementById("summary").innerHTML=
`
<b>Name:</b> ${name}<br><br>

<b>Blind Bag:</b> ${bag}<br><br>

<b>Type:</b> ${type}
`;

show(5);

}

</script>

</body>
</html>
